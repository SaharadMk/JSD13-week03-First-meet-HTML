<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thai-Pan</title>
  </head>
  <body>
    <h1 style="text-align: center">IJKL not IQYI</h1>
    <h2 style="text-align: center">มาดูหนังกันเถอะ</h2>
    <h3>Sign in</h3>
    <form action="" method="get">
        <label>
            ชื่อผู้ใช้
            <input id="cname" type="text" name="cname" placeholder="ชื่อผู้ใช้ที่คุณต้องการ" required />
        </label>
          <label>
            รหัสผ่าน
            <input id="password" type="password" name="cname" placeholder="รหัสผ่าน" required />
          </label>
            <label>
              Email
              <input id="cname" type="email" name="cname" placeholder="อีเมลล์ที่ใช้สมัคร" required />
            </label>

      <h3>Package</h3>
      <label>
        Free
        <input type="radio" name="Package" checked />
      </label>
      <label>
        Premium
        <input type="radio" name="Package" />
      </label>
      <h3>Intersting</h3>
      <label>
        เรียนแต่งหน้า
        <input type="checkbox" name="Intersting" />
      </label>
        นั่งสมาธิ
        <input type="checkbox" name="Intersting" />
      </label>
        ดำน้ำ
        <input type="checkbox" name="Intersting" />
      </label>
        ปลูกปะการัง
        <input type="checkbox" name="Intersting" />
      </label>
        ทำอาหาร
        <input type="checkbox" name="Intersting" />
      </label>
        นวดสปา
        <input type="checkbox" name="Intersting" />
      </label>
        ปลูกป่า
        <input type="checkbox" name="Intersting" />
      </label>
        ดำนา
        <input type="checkbox" name="Intersting" />
      </label>
        ดูดิสนีย์ออนไอซ์
        <input type="checkbox" name="Intersting" />
      </label>

<br>
      <button type="submit">ยืนยันการสมัคร</button>
    </form>
  </body>
</html>
